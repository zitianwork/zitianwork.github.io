<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<link rel="stylesheet" type="text/css" href="style.css"/>
		<title>小蔚生日快乐！</title>
	</head>
	<body>
		<h1>小蔚生日快乐！</h1>
		<h2>视频暂未开放</h2>
		<h3>请耐心等待</h3>
		<h4 id="hh"></h4>
		<button onclick="window.location.href='../html/yg.html'" type="button" id="add">点我跳转至预告</button>
	</body>
	
	<script type="text/javascript">
			function station(x,y,z){
				//当前时间
				var now = Date.now(),
					//结束时间
					end = new Date(x,y-1,z),
					ends = end.getTime();
				var ss = ends - now;
				var s = Math.floor(ss/1000);
				//相差天数
				var day = Math.floor(s / 60 / 60 / 24);
				//相差小时数
				var hours = Math.floor(s / 60 / 60 % 24);
				//相差分钟数
				var min = Math.floor(s / 60 % 60 );
				//相差秒数
				var sec = Math.floor(s % 60 );
				var html = "距小蔚生日还有"+day+"天"+hours+"时"+min+"分"+sec+"秒";
				hh.innerHTML = html;
	
			}
			station(2023,08,10);
			//一秒一次调用
			setInterval(function(){
				station(2023,08,10);
			},1000);
		</script>
		<style type="text/css">
			#hh{
				font-size: 25px;
				text-align: center;
			}
		</style>
</html>
